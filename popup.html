<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GitHub README Wiki</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <div class="brand">
        <span>ReadWiki</span>
      </div>
      <form id="form">
        <input id="repoInput" autocomplete="off" spellcheck="false" placeholder="owner/repo or GitHub URL" />
        <button type="submit">Open</button>
      </form>
      <button id="currentTab" type="button" disabled>Open current GitHub repo</button>
      <p id="message"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
